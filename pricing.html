<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Pricing Requests | Yame</title>
  <meta http-equiv="refresh" content="0;url=contact.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="Pricing requests are handled through direct quotation support from Yame.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="author" content="Yame Paper">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f6f3;
      color: #1f2a23;
    }

    .redirect-card {
      max-width: 560px;
      padding: 32px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 40px rgba(31, 42, 35, 0.08);
      text-align: center;
    }

    .redirect-card h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 28px;
    }

    .redirect-card p {
      margin-bottom: 24px;
      line-height: 1.7;
      color: #526056;
    }

    .redirect-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .redirect-actions a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }

    .redirect-actions a:first-child {
      background: #44a36f;
      color: #ffffff;
    }

    .redirect-actions a:last-child {
      border: 1px solid #44a36f;
      color: #2f7f54;
    }
  </style>
</head>

<body>
  <main class="redirect-card">
    <h1>Pricing Is Shared By Quote</h1>
    <p>
      Yame does not publish a fixed pricing page. Please share your target market,
      specifications and quantity, and we will reply with a practical quotation plan.
    </p>
    <div class="redirect-actions">
      <a href="contact.html">Contact Us</a>
      <a href="project.html">View Products</a>
    </div>
  </main>
</body>

</html>
